; 仅微信 iLink + WiFi（无 AdvanceOS）。中文：fonts::efontCN_12 + M5Claw chat.cpp 的 fitBytes 换行。
; 编译：在此目录执行 pio run
; 烧录：pio run -t upload

[env:cardputer-wechat]
platform = espressif32
board = m5stack-stamps3
framework = arduino
lib_deps =
	m5stack/M5Cardputer
	bblanchon/ArduinoJson@^7.0.0
board_build.partitions = ../AdvanceOS.csv
monitor_speed = 115200
upload_speed = 921600
